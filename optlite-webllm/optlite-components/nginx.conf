server {
    listen 8000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve under /OPT_Mentor/ — nginx ingress rewrite-target strips the prefix,
    # so container sees "/" paths. This config works for both root and sub-path.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # AI reverse proxy — forwards /ai-proxy/ to the real API with key injected.
    # The browser never sees the API key; it only calls same-origin /ai-proxy/.
    # Set API_PROXY_TARGET and API_PROXY_KEY as env vars at container start.
    location /ai-proxy/ {
        resolver 10.96.0.1 valid=300s;  # kube-dns
        proxy_pass ${API_PROXY_TARGET}/;
        proxy_set_header Host $proxy_host;
        proxy_set_header Authorization "Bearer ${API_PROXY_KEY}";
        proxy_set_header Content-Type $http_content_type;
        proxy_set_header Accept $http_accept;
        proxy_buffering off;            # SSE streaming
        proxy_read_timeout 120s;
        proxy_cache off;
    }

    # Return empty favicon to avoid 404 noise
    location = /favicon.ico {
        return 204;
        access_log off;
        log_not_found off;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|svg|jpg|jpeg|gif|ico|woff|woff2|ttf|whl)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
    }
}
